{% extends "base.html" %}
{% block content %}
<h2 class="section-title mb-4">👋 Welcome, {{ user.username }}!</h2>
<div class="row g-4">
  <div class="col-md-6">
    <div class="card text-center p-4">
      <div class="fs-1 mb-2">🔍</div>
      <h5>Retrieve Product Details</h5>
      <p class="text-muted small">Search product details by Product ID from Blockchain</p>
      <a href="/retrieve_product" class="btn btn-primary">Go</a>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card text-center p-4">
      <div class="fs-1 mb-2">📷</div>
      <h5>Authenticate Barcode Scan</h5>
      <p class="text-muted small">Upload a barcode image to verify if product is genuine</p>
      <a href="/authenticate_scan" class="btn btn-success">Go</a>
    </div>
  </div>
</div>
{% endblock %}
