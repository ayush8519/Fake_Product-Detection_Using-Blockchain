{% extends "base.html" %}
{% block content %}
<h2 class="section-title mb-4">🛡️ Admin Dashboard</h2>
<div class="row g-4">
  <div class="col-md-4">
    <div class="card text-center p-4">
      <div class="fs-1 mb-2">📦</div>
      <h5>Add Product Details</h5>
      <p class="text-muted small">Upload barcode & store product on Blockchain</p>
      <a href="/add_product" class="btn btn-primary">Go</a>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card text-center p-4">
      <div class="fs-1 mb-2">📋</div>
      <h5>View Product Details</h5>
      <p class="text-muted small">See all products stored on Blockchain</p>
      <a href="/view_products" class="btn btn-primary">Go</a>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card text-center p-4">
      <div class="fs-1 mb-2">👥</div>
      <h5>View User Details</h5>
      <p class="text-muted small">See all registered users on Blockchain</p>
      <a href="/view_users" class="btn btn-primary">Go</a>
    </div>
  </div>
</div>
{% endblock %}
