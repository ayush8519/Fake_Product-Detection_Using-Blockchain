{% extends "base.html" %}
{% block content %}
<h2 class="section-title mb-4">📦 Add Product Details</h2>
<div class="row">
  <div class="col-md-7">
    <div class="card">
      <div class="card-header">Enter Product Information</div>
      <div class="card-body p-4">
        <form method="POST" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text" name="productName" class="form-control" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">Product Description</label>
            <textarea name="productDesc" class="form-control" rows="3" required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Product Price (₹)</label>
            <input type="text" name="productPrice" class="form-control" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">Upload Barcode Image</label>
            <input type="file" name="barcodeImage" class="form-control" accept="image/*" required/>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            Generate Signature &amp; Store on Blockchain
          </button>
        </form>
      </div>
    </div>
  </div>

  {% if message %}
  <div class="col-md-5 mt-3 mt-md-0">
    <div class="card border-success">
      <div class="card-header bg-success text-white">✅ Blockchain Storage Result</div>
      <div class="card-body">
        <p><strong>Product ID:</strong> <span class="text-danger fs-5">{{ product_id }}</span></p>
        <p><strong>Digital Signature:</strong></p>
        <code class="text-danger" style="word-break:break-all;">{{ signature }}</code>
        <hr/>
        <p class="text-muted small">{{ message }}</p>
      </div>
    </div>
  </div>
  {% endif %}
</div>
{% endblock %}
