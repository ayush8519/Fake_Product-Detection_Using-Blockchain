{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card mt-4">
      <div class="card-header text-center fs-5">👤 User Signup</div>
      <div class="card-body p-4">
        {% if message %}
          <div class="alert alert-success">{{ message }}</div>
        {% endif %}
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">Contact Number</label>
            <input type="text" name="contact" class="form-control" required/>
          </div>
          <button type="submit" class="btn btn-success w-100">Register on Blockchain</button>
        </form>
        <hr/>
        <p class="text-center">Already have an account? <a href="/user_login">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
